<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <title><!-- DESIGNER:TITLE --></title>
  <style>
    /* --- CSS-Vars: werden vom Designer-Skill aus ./STYLE-GUIDE.md injiziert --- */
    :root {
      --color-bg: #ffffff;
      --color-fg: #0a0a0a;
      --color-primary: #0a0a0a;
      --color-secondary: #404040;
      --color-accent: #0066ff;
      --color-muted: rgba(10,10,10,0.55);
      --color-border: rgba(10,10,10,0.12);
      --color-card-bg: rgba(255,255,255,0.5);
      --font-heading: "Inter", system-ui, sans-serif;
      --font-body: "Inter", system-ui, sans-serif;
      --font-mono: "JetBrains Mono", ui-monospace, monospace;
      --space-base: 8px;
      --gutter: 24px;
      --max-width: 720px;
      --radius-base: 8px;
      --radius-pill: 999px;
    }

    @page { size: A4; margin: 0; }

    * { box-sizing: border-box; -webkit-font-smoothing: antialiased; }
    html, body { margin: 0; padding: 0; background: var(--color-bg); color: var(--color-fg); font-family: var(--font-body); }

    .designer-page {
      position: relative;
      width: 210mm;
      height: 297mm;
      padding: 24mm 22mm;
      background: var(--color-bg);
      background-clip: padding-box;
      -webkit-background-clip: padding-box;
      transform: translateZ(0);
      overflow: hidden;
      page-break-after: always;
      break-after: page;
    }
    .designer-page:last-child { page-break-after: auto; break-after: auto; }

    .designer-ornament {
      position: absolute;
      pointer-events: none;
      width: 280px;
      height: 280px;
      top: -120px;
      right: -120px;
      background: radial-gradient(circle, var(--color-accent) 0%, transparent 70%);
      filter: blur(20px);
      opacity: 0.16;
      background-attachment: scroll;
    }

    h1 { font-family: var(--font-heading); font-weight: 600; font-size: 36px; line-height: 1.15; margin: 0 0 calc(var(--space-base) * 2) 0; color: var(--color-primary); letter-spacing: -0.01em; }
    h2 { font-family: var(--font-heading); font-weight: 600; font-size: 22px; line-height: 1.25; margin: calc(var(--space-base) * 4) 0 calc(var(--space-base) * 1.5) 0; color: var(--color-primary); }
    h3 { font-family: var(--font-heading); font-weight: 600; font-size: 16px; line-height: 1.3; margin: calc(var(--space-base) * 3) 0 var(--space-base) 0; color: var(--color-primary); text-transform: uppercase; letter-spacing: 0.06em; }
    p, li { font-size: 11pt; line-height: 1.55; color: var(--color-fg); margin: 0 0 calc(var(--space-base) * 1.5) 0; }
    em, .accent { color: var(--color-accent); font-style: italic; }
    a { color: var(--color-accent); text-decoration: none; border-bottom: 1px solid currentColor; }

    .meta { font-family: var(--font-mono); font-size: 9pt; color: var(--color-muted); letter-spacing: 0.04em; margin-bottom: calc(var(--space-base) * 4); }

    blockquote { border-left: 3px solid var(--color-accent); margin: 0 0 calc(var(--space-base) * 2) 0; padding-left: var(--gutter); font-style: italic; color: var(--color-secondary); }

    pre { background: var(--color-fg); color: var(--color-bg); font-family: var(--font-mono); font-size: 9pt; padding: calc(var(--space-base) * 2); border-radius: var(--radius-base); overflow: hidden; }
    code { font-family: var(--font-mono); font-size: 0.92em; }

    table { width: 100%; border-collapse: collapse; margin: 0 0 calc(var(--space-base) * 2) 0; font-size: 10pt; }
    th, td { text-align: left; padding: calc(var(--space-base) * 1.25) calc(var(--space-base) * 1.5); border-bottom: 1px solid var(--color-border); }
    th { font-weight: 600; color: var(--color-primary); }

    .footer { position: absolute; bottom: 12mm; left: 22mm; right: 22mm; display: flex; justify-content: space-between; font-family: var(--font-mono); font-size: 8.5pt; color: var(--color-muted); }
  </style>
</head>
<body data-format="a4-report">
  <section class="designer-page">
    <div class="designer-ornament"></div>
    <div class="meta"><!-- DESIGNER:META --></div>
    <h1><!-- DESIGNER:TITLE --></h1>
    <!-- DESIGNER:CONTENT -->
    <div class="footer"><span><!-- DESIGNER:FOOTER-LEFT --></span><span><!-- DESIGNER:FOOTER-RIGHT --></span></div>
  </section>
  <!-- Skill repliziert <section class="designer-page">...</section> N-mal bei Multi-Page -->
</body>
</html>
